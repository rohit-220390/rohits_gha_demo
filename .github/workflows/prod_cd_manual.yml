name: CD (Production Manual)

on:
  workflow_dispatch:

jobs:
  pre_deploy_checks:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and install dependencies
        uses: ./.github/actions/node-setup

      - name: Run tests
        run: npm test

  deploy_production:
    name: Deploy to Production
    needs: pre_deploy_checks
    environment: production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and install dependencies
        uses: ./.github/actions/node-setup

      - name: Package application
        run: |
          mkdir -p build
          tar -czf build/node-demo-app.tar.gz src package.json package-lock.json

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-demo-app-production
          path: build/node-demo-app.tar.gz