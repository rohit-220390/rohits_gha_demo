name: Node.js CI/CD Demo

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and install dependencies
        uses: ./.github/actions/node-setup

      - name: Run tests
        run: npm test

  cd:
    name: Demo Deploy
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and install dependencies
        uses: ./.github/actions/node-setup

      - name: Package application
        run: |
          mkdir -p build
          tar -czf build/node-demo-app.tar.gz src package.json package-lock.json

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-demo-app
          path: build/node-demo-app.tar.gz
